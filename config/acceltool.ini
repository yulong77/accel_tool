######################################
# AccelTool Configuration File
# Edit the settings below as needed.
######################################

# Serial / base station
port=COM3
baudrate=3000000

# Wireless node
nodeAddress=56384
forceSetToIdle=true
configureNode=true
useSyncSampling=true
useLxrsPlus=true
sampleRateHz=2048
inactivityTimeoutSeconds=7200
unlimitedDuration=true

# Acquisition
maxSamples=5000
readTimeoutMs=10
axisMode=XYZ

# Output
outputCsvPath=accel_data.csv
printToConsole=true
printEvery=100

# Debug
dumpSweepChannelsAtStartup=true
printCurrentNodeConfig=true

